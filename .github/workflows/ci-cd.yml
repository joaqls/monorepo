name: CI Monorepo

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CI: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run tests (ChromeHeadless)
        run: npm run test -- --watch=false --browsers=ChromeHeadlessNoSandbox --no-progress

      - name: Build production
        run: npm run build -- --configuration production

  backend:
    name: Backend (Laravel)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          extensions: mbstring, bcmath, pdo_sqlite
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: |
            backend/vendor
            ~/.composer/cache/files
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --prefer-dist --optimize-autoloader

      - name: Configure application environment
        run: |
          cp .env.example .env || true
          php artisan key:generate --force
          mkdir -p database
          touch database/database.sqlite
          {
            echo "APP_ENV=testing"
            echo "DB_CONNECTION=sqlite"
            echo "DB_DATABASE=${{ github.workspace }}/backend/database/database.sqlite"
            echo "CACHE_STORE=array"
            echo "SESSION_DRIVER=array"
            echo "QUEUE_CONNECTION=sync"
          } >> .env

      - name: Run database migrations
        run: php artisan migrate --force

      - name: Run tests
        run: php artisan test

