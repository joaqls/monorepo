<h2>Partidos de tu equipo</h2>

<p>
  Equipo: <strong>{{ equipo }}</strong>
</p>

<div *ngFor="let p of partidos" class="mb-3 border p-3 rounded">

  <p>
    {{ nombreClub(p, 'local') }} vs {{ nombreClub(p, 'visitante') }} —
    {{ p.fecha | date:'dd/MM/yyyy' }} —
    <strong>Estado:</strong> {{ getEstadoPartido(p) }}
  </p>

  <div *ngIf="puedeEnviarResultado(p)">

    <input
      class="form-control mb-2"
      placeholder="Ej: 2-1"
      [(ngModel)]="resultados[p.id]">

    <button
      class="btn btn-primary"
      (click)="enviarResultado(p)">
      Enviar resultado
    </button>

  </div>

  <div *ngIf="!puedeEnviarResultado(p)">
    <em>{{ mensajeEstado(p) }}</em>
  </div>

</div>
